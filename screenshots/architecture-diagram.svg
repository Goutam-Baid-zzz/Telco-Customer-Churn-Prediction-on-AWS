<svg width="680" height="900" viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b8f9a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="900" fill="#0d1117"/>

  <!-- 1. Local CSV upload -->
  <rect x="200" y="30" width="280" height="56" rx="8" fill="#3a2418" stroke="#F0997B" stroke-width="1"/>
  <text x="340" y="52" text-anchor="middle" fill="#F5C4B3" font-size="14" font-weight="600">Local CSV upload</text>
  <text x="340" y="70" text-anchor="middle" fill="#D9A48E" font-size="12">boto3 push script</text>
  <line x1="340" y1="86" x2="340" y2="120" stroke="#8b8f9a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 2. S3 raw -->
  <rect x="200" y="120" width="280" height="56" rx="8" fill="#0e2338" stroke="#378ADD" stroke-width="1"/>
  <text x="340" y="142" text-anchor="middle" fill="#85B7EB" font-size="14" font-weight="600">Amazon S3 — raw/</text>
  <text x="340" y="160" text-anchor="middle" fill="#7FA8CF" font-size="12">Source dataset landing zone</text>
  <line x1="340" y1="176" x2="340" y2="210" stroke="#8b8f9a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 3. Glue ETL -->
  <rect x="200" y="210" width="280" height="56" rx="8" fill="#221b3a" stroke="#7F77DD" stroke-width="1"/>
  <text x="340" y="232" text-anchor="middle" fill="#CECBF6" font-size="14" font-weight="600">AWS Glue ETL job</text>
  <text x="340" y="250" text-anchor="middle" fill="#AFA9EC" font-size="12">Type cast, encode, clean</text>
  <line x1="340" y1="266" x2="340" y2="300" stroke="#8b8f9a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 4. S3 processed -->
  <rect x="200" y="300" width="280" height="56" rx="8" fill="#0e2338" stroke="#378ADD" stroke-width="1"/>
  <text x="340" y="322" text-anchor="middle" fill="#85B7EB" font-size="14" font-weight="600">Amazon S3 — processed/</text>
  <text x="340" y="340" text-anchor="middle" fill="#7FA8CF" font-size="12">Cleaned, ML-ready data</text>
  <line x1="340" y1="356" x2="340" y2="390" stroke="#8b8f9a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 5. SageMaker training -->
  <rect x="200" y="390" width="280" height="56" rx="8" fill="#0d2b24" stroke="#1D9E75" stroke-width="1"/>
  <text x="340" y="412" text-anchor="middle" fill="#9FE1CB" font-size="14" font-weight="600">SageMaker training job</text>
  <text x="340" y="430" text-anchor="middle" fill="#7BC4A8" font-size="12">XGBoost classifier</text>
  <line x1="340" y1="446" x2="340" y2="480" stroke="#8b8f9a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 6. SageMaker endpoint -->
  <rect x="200" y="480" width="280" height="56" rx="8" fill="#0d2b24" stroke="#1D9E75" stroke-width="1"/>
  <text x="340" y="502" text-anchor="middle" fill="#9FE1CB" font-size="14" font-weight="600">SageMaker endpoint</text>
  <text x="340" y="520" text-anchor="middle" fill="#7BC4A8" font-size="12">Real-time inference</text>
  <line x1="340" y1="536" x2="340" y2="570" stroke="#8b8f9a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 7. Lambda -->
  <rect x="200" y="570" width="280" height="56" rx="8" fill="#3a2418" stroke="#F0997B" stroke-width="1"/>
  <text x="340" y="592" text-anchor="middle" fill="#F5C4B3" font-size="14" font-weight="600">Lambda</text>
  <text x="340" y="610" text-anchor="middle" fill="#D9A48E" font-size="12">Invokes SageMaker endpoint</text>
  <line x1="340" y1="626" x2="340" y2="660" stroke="#8b8f9a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 8. API Gateway -->
  <rect x="200" y="660" width="280" height="56" rx="8" fill="#301721" stroke="#D4537E" stroke-width="1"/>
  <text x="340" y="682" text-anchor="middle" fill="#F4C0D1" font-size="14" font-weight="600">API Gateway</text>
  <text x="340" y="700" text-anchor="middle" fill="#DE93AC" font-size="12">POST /predict, CORS enabled</text>
  <line x1="340" y1="716" x2="340" y2="750" stroke="#8b8f9a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 9. Frontend -->
  <rect x="200" y="750" width="280" height="56" rx="8" fill="#22221f" stroke="#B4B2A9" stroke-width="1"/>
  <text x="340" y="772" text-anchor="middle" fill="#D3D1C7" font-size="14" font-weight="600">Browser frontend</text>
  <text x="340" y="790" text-anchor="middle" fill="#ABA9A0" font-size="12">Signal Check UI</text>
</svg>
